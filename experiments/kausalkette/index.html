<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Die Kette – Der Realitäts-Check – Klarkommen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#0f1923;--bg-card:#162230;--bg-card-alt:#1a2b3d;--accent:#f97316;--accent-glow:rgba(249,115,22,.25);--accent-soft:#fb923c;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--red:#ef4444;--red-soft:rgba(239,68,68,.15);--green:#22c55e;--green-soft:rgba(34,197,94,.15);--green-glow:rgba(34,197,94,.25);--border:rgba(148,163,184,.1);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(249,115,22,.05) 0%,transparent 50%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column}

.card-area{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:1rem 1.5rem;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.card{max-width:480px;width:100%;text-align:center;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s;pointer-events:none;margin:auto 0}
.card.active{opacity:1;transform:translateY(0);pointer-events:all}
.card.exit-up{opacity:0;transform:translateY(-30px)}

.card-icon{width:160px;height:160px;margin:0 auto 1.5rem;position:relative}
.card-icon svg{width:100%;height:100%}
.card-icon img{width:100%;height:100%;object-fit:contain}

.card-loop-badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--accent);border:1.5px solid rgba(249,115,22,.3);border-radius:20px;padding:.25rem .75rem;margin-bottom:.75rem;letter-spacing:.05em;text-transform:uppercase;opacity:.7}

.card h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.3rem,4.5vw,1.7rem);letter-spacing:-.02em;line-height:1.2;margin-bottom:.75rem;color:var(--text)}
.card h2 .accent{color:var(--accent)}
.card h2 .green{color:var(--green)}
.card h2.big{font-size:clamp(2.5rem,10vw,4rem);color:var(--accent);margin-bottom:1rem}

.card p{color:var(--text2);font-size:clamp(.88rem,2.5vw,1rem);line-height:1.65;max-width:400px;margin:0 auto}
.card p strong{color:var(--text);font-weight:600}
.card p .accent{color:var(--accent);font-weight:600}
.card p .green{color:var(--green);font-weight:600}
.card p .neg{color:var(--accent);font-weight:600}
.card p .pos{color:var(--green);font-weight:600}

.intro-label{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}

.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.9rem 2rem;border:2px solid var(--accent);border-radius:12px;background:rgba(249,115,22,.1);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:1.5rem;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:hover{background:rgba(249,115,22,.22);box-shadow:0 0 20px var(--accent-glow);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn.small{padding:.7rem 1.4rem;font-size:.9rem;margin-top:1rem}
.btn.green{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.btn.green:hover{background:rgba(34,197,94,.25);box-shadow:0 0 20px rgba(34,197,94,.2)}

/* Progress chain */
.progress{padding:.75rem 1.5rem 1.25rem;display:flex;align-items:center;justify-content:center;gap:0;position:relative}
.progress-dot{width:30px;height:30px;border-radius:50%;background:var(--bg-card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .4s;position:relative;flex-shrink:0}
.progress-dot.done{border-color:var(--accent);background:rgba(249,115,22,.15)}
.progress-dot.done svg{opacity:1}
.progress-dot svg{width:14px;height:14px;opacity:.25;transition:opacity .4s}
.progress-line{width:20px;height:1.5px;background:var(--border);transition:background .4s;flex-shrink:0}
.progress-line.done{background:var(--accent)}

.flash{position:fixed;inset:0;background:var(--bg);z-index:100;opacity:0;pointer-events:none;transition:opacity .15s}
.flash.on{opacity:1;pointer-events:all}

/* Auto-loop strobo area */
.auto-area{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.auto-icon{width:50px;height:50px;opacity:0;transform:scale(.5);transition:all .2s}
.auto-icon.pop{opacity:1;transform:scale(1)}
.auto-icon.shrink{opacity:0;transform:scale(.3)}
.auto-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent);opacity:0;transition:opacity .15s;height:1.4em;display:flex;align-items:center}
.auto-label.show{opacity:1}
.auto-clock{position:relative;width:44px;height:44px;margin-top:.25rem}
.auto-clock .clock-face{width:100%;height:100%;border-radius:50%;border:1.5px solid var(--text3);position:relative}
.auto-clock .clock-hand{position:absolute;bottom:50%;left:50%;width:1.5px;height:16px;background:var(--accent);transform-origin:bottom center;border-radius:1px}
.auto-clock .clock-center{position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%)}
.auto-plant{margin-top:.5rem;transition:opacity .5s;opacity:1}
.auto-plant svg{overflow:visible}
.auto-plant .plant-group{transition:transform .8s ease;transform-origin:30px 58px}
.auto-plant .plant-stem{transition:stroke .6s}
.auto-plant .plant-leaf{transition:fill .6s,opacity .6s}

/* Three-panel swipe */
.swipe-container{width:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
.swipe-track{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform}
.swipe-panel{min-width:100%;padding:0 .25rem;box-sizing:border-box}

.panel-box{border-radius:14px;padding:1.1rem 1rem;text-align:left;min-height:220px;position:relative;overflow:hidden;overflow-y:auto;max-height:55vh}
.panel-box.negative{background:rgba(249,115,22,.06);border:1.5px solid rgba(249,115,22,.2)}
.panel-box.shift{background:linear-gradient(135deg,rgba(249,115,22,.06),rgba(34,197,94,.06));border:1.5px solid rgba(148,163,184,.15)}
.panel-box.positive{background:rgba(34,197,94,.06);border:1.5px solid rgba(34,197,94,.2)}

.panel-bg-spiral{position:absolute;right:-20px;bottom:-20px;width:120px;height:120px;opacity:.06;pointer-events:none}

.panel-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
.panel-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.panel-title .dot.orange{background:var(--accent)}
.panel-title .dot.green{background:var(--green)}

.chain-step{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.55rem;font-size:.85rem;line-height:1.5;color:var(--text2)}
.chain-step .arrow{color:var(--accent);font-weight:700;font-family:'Space Grotesk',sans-serif;flex-shrink:0;width:16px;text-align:center;margin-top:1px}
.chain-step.green-chain .arrow{color:var(--green)}
.chain-step strong{color:var(--text);font-weight:600}

.loop-arrow{text-align:center;margin-top:.5rem;font-size:1.2rem;opacity:.6}
.loop-arrow.neg{color:var(--accent)}
.loop-arrow.pos{color:var(--green)}

.shift-img{width:120px;height:auto;border-radius:12px;margin:0 auto .75rem;display:block;filter:drop-shadow(0 0 20px rgba(249,115,22,.3))}

.swipe-nav{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-top:1rem}
.swipe-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .3s;cursor:pointer}
.swipe-dot.active{background:var(--accent);transform:scale(1.3)}
.swipe-arrow{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .25s;font-family:'Space Grotesk',sans-serif;-webkit-tap-highlight-color:transparent}
.swipe-arrow.left{border-color:rgba(249,115,22,.4);color:var(--accent);animation:glow-orange 2s ease-in-out infinite}
.swipe-arrow.right{border-color:rgba(34,197,94,.4);color:var(--green);animation:glow-green 2s ease-in-out infinite}
@keyframes glow-orange{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.2)}50%{box-shadow:0 0 12px 3px rgba(249,115,22,.25)}}
@keyframes glow-green{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.2)}50%{box-shadow:0 0 12px 3px rgba(34,197,94,.25)}}
.swipe-arrow:active{transform:scale(.92)}
.swipe-hint{font-size:.75rem;color:var(--text2);text-align:center;margin-top:.5rem;font-family:'Space Grotesk',sans-serif;font-weight:500}

/* Unbequeme Frage */
.frage-box{background:rgba(249,115,22,.04);border:1px solid rgba(249,115,22,.15);border-radius:12px;padding:1rem;margin-top:1rem;text-align:left;max-width:420px;margin-left:auto;margin-right:auto;transition:border-color .3s}
.frage-box.open{border-color:rgba(249,115,22,.4)}
.frage-toggle{display:flex;align-items:center;gap:.5rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.frage-toggle .icon{font-size:1.1rem}
.frage-toggle .label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:var(--text2);transition:color .3s}
.frage-box.open .frage-toggle .label{color:var(--accent)}
.frage-toggle .chevron{color:var(--text3);font-size:1rem;margin-left:auto;transition:transform .3s,color .3s;font-weight:700}
.frage-toggle .chevron.open{transform:rotate(180deg);color:var(--accent)}
.frage-close{display:none;text-align:center;margin-top:.75rem;padding:.5rem 1rem;border:1.5px solid rgba(249,115,22,.3);border-radius:8px;background:rgba(249,115,22,.08);color:var(--accent);font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.frage-close:active{transform:scale(.96)}
.frage-body{max-height:0;overflow:hidden;transition:max-height .5s ease}
.frage-body.open{max-height:1000px}
.frage-body-inner{padding-top:.75rem;font-size:.85rem;line-height:1.6;color:var(--text2)}
.frage-body-inner strong{color:var(--text);font-weight:600}
.frage-body-inner .highlight{color:var(--accent);font-weight:600}

/* Sources */
.sources-toggle{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text3);font-size:.78rem;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:1rem;transition:all .2s;-webkit-tap-highlight-color:transparent}
.sources-toggle:hover{border-color:var(--accent);color:var(--text2)}
.sources-list{max-width:440px;margin:.75rem auto 0;text-align:left;font-size:.75rem;line-height:1.6;color:var(--text3);max-height:0;overflow-y:auto;transition:max-height .4s ease}
.sources-list.open{max-height:250px}
.sources-list .src{margin-bottom:.5rem;padding-left:.75rem;border-left:2px solid rgba(249,115,22,.2)}
.sources-list .src-claim{color:var(--text2);font-weight:500}

@media(max-height:640px){
  .card-area{padding:.5rem 1rem}
  .card-icon{width:110px;height:110px;margin-bottom:.75rem}
  .card h2{font-size:1.15rem}
  .card p{font-size:.83rem}
  .btn{margin-top:.75rem;padding:.7rem 1.4rem;font-size:.88rem}
  .progress{padding:.5rem 1rem .75rem}
  .progress-dot{width:26px;height:26px}
  .progress-dot svg{width:12px;height:12px}
  .progress-line{width:14px}
  .panel-box{min-height:auto;padding:.85rem .8rem;max-height:48vh}
  .chain-step{font-size:.78rem;margin-bottom:.35rem}
  .shift-img{width:90px}
}
</style>
</head>

<div class="app">
  <div class="card-area"><div id="card" class="card"></div></div>
  <div id="progress" class="progress"></div>
  <div id="flash" class="flash"></div>
</div>

  } else if (s.icon) {
    html += `<div class="card-icon">${icons[s.icon]}</div>`;
  }

  if (s.isGesamt) {
    html += renderGesamt();
  } else {
    if (s.title) html += `<h2${s.titleClass ? ' class="'+s.titleClass+'"':''}>${s.title}</h2>`;
    if (s.text) html += `<p>${s.text}</p>`;
  }

  if (s.btn) html += `<button class="btn ${s.btnClass||''}" onclick="next()">${s.btn} →</button>`;
  card.innerHTML = html;
  if (s.isGesamt) initSwipe();
}

          <div class="chain-step green-chain"><span class="arrow">→</span><span><strong>Mehr Energie, besserer Schlaf, höhere Leistungsfähigkeit</strong></span></div>
          <div class="loop-arrow pos">↻ Aufwärtsspirale</div>
          <p style="font-size:.78rem;color:var(--text2);margin-top:.5rem;text-align:center">Wenn die neuen Gedanken zu Autobahnen werden, läuft dieser Kreislauf von selbst — <strong style="color:var(--green)">für dich</strong>, nicht gegen dich.</p>

    </div>
    <div class="swipe-nav">
      <button class="swipe-arrow left" id="swPrev" onclick="swipeTo(-1)">‹</button>
      <span class="swipe-dot active" onclick="swipeToIdx(0)"></span>
      <span class="swipe-dot" onclick="swipeToIdx(1)"></span>
      <span class="swipe-dot" onclick="swipeToIdx(2)"></span>

  <div class="frage-box" id="frageBox">
    <div class="frage-toggle" onclick="toggleFrage()">
      <span class="icon">💬</span>
      <span class="label">„Aber ich muss doch informiert bleiben?"</span>

    <div class="frage-body" id="frageBody">

    <div class="src"><span class="src-claim">Chronischer Stress → Schlaf, Immunsystem, kognitive Leistung:</span><br>Buckley & Schatzberg (2005), <em>J. Clin. Endocrinol. Metab.</em> / Cohen, S. et al. (2012), <em>PNAS</em> / Lim & Dinges (2010), <em>Psychological Bulletin</em>.</div>
    <div class="src"><span class="src-claim">Schlafentzug erhöht Amygdala-Reaktivität (~60%):</span><br>Yoo, S.-S. et al. (2007). <em>Current Biology</em>, 17(20), R877–R878.</div>
    <div class="src"><span class="src-claim">Erschöpfung → impulsiver Medienkonsum (Ego Depletion):</span><br>Reinecke, L. (2014). <em>Journal of Communication</em>, 64(4), 721–742.</div>
    <div class="src"><span class="src-claim">Chronisches Cortisol → beschleunigte Zellalterung:</span><br>Epel, E. S. et al. (2004). <em>PNAS</em>, 101(49), 17312–17315.</div>
    <div class="src"><span class="src-claim">Neuronale Bahnung — Gedanken werden zu Autobahnen:</span><br>Hebb, D. O. (1949). <em>The Organization of Behavior.</em> Wiley.</div>
    <div class="src"><span class="src-claim">Positive Emotionen → stärkeres Immunsystem:</span><br>Segerstrom, S. C. & Miller, G. E. (2004). <em>Psychological Bulletin</em>, 130(4), 601–630.</div>
    <div class="src"><span class="src-claim">5-Sinne-Shift (Grounding) — validierte Technik zur Musterunterbrechung:</span><br>Ursprung: DBT (Linehan, 1993) / Traumatherapie. Breite klinische Anwendung bei Ruminieren, Dissoziation und Angstbewältigung.</div>

function toggleSources() { document.getElementById('sourcesList').classList.toggle('open'); }
function toggleFrage() {
  const body = document.getElementById('frageBody');
  const chev = document.getElementById('frageChevron');
  const box = document.getElementById('frageBox');
  const close = document.getElementById('frageClose');
  const isOpen = body.classList.toggle('open');
  chev.classList.toggle('open');
  if (box) box.classList.toggle('open');
  if (close) close.style.display = isOpen ? 'block' : 'none';
}

// Swipe
let swipeIdx = 0, touchStartX = 0, touchDelta = 0;
function initSwipe() {
  const c = document.getElementById('swipeContainer');
  if (!c) return;
  c.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchDelta = 0; }, {passive:true});
  c.addEventListener('touchmove', e => { touchDelta = e.touches[0].clientX - touchStartX; }, {passive:true});
  c.addEventListener('touchend', () => { if (Math.abs(touchDelta) > 40) swipeTo(touchDelta < 0 ? 1 : -1); });
  updateSwipeUI();
}
function swipeTo(dir) { swipeIdx = Math.max(0, Math.min(2, swipeIdx + dir)); updateSwipeUI(); }
function swipeToIdx(idx) { swipeIdx = idx; updateSwipeUI(); }
function updateSwipeUI() {
  const t = document.getElementById('swipeTrack');
  if (!t) return;
  t.style.transform = `translateX(-${swipeIdx*100}%)`;
  document.querySelectorAll('.swipe-dot').forEach((d,i) => d.classList.toggle('active', i===swipeIdx));
  const h = document.getElementById('swipeHint');
  if (h && swipeIdx > 0) h.style.opacity = '0';
}

// Progress
function updateProgress() {
  const p = document.getElementById('progress');
  let h = '';
  chainKeys.forEach((k,i) => {
    if (i > 0) h += `<div class="progress-line${chainState[i-1]&&chainState[i]?' done':''}"></div>`;
    h += `<div class="progress-dot${chainState[i]?' done':''}">${miniIcons[k]}</div>`;
  });
  p.innerHTML = h;
}
function fillChainTo(idx, fast) {
  if (idx < 0) return;
  for (let i = 0; i <= idx; i++) {
    if (fast && !chainState[i]) setTimeout(((ii) => () => { chainState[ii]=true; updateProgress(); })(i), i*60);
    else chainState[i] = true;
  }
  if (!fast) updateProgress();
}
function resetChain() { chainState=[false,false,false,false,false]; updateProgress(); }

function showCard(idx) {
  const card = document.getElementById('card');
  card.classList.remove('active');
  card.classList.add('exit-up');
  setTimeout(() => {
    if (steps[idx].resetChain) resetChain();
    renderCard(idx);
    card.classList.remove('exit-up');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.classList.add('active');
      const s = steps[idx];
      if (s.chain >= 0) {
        if (s.fastFill) fillChainTo(s.chain, true);
        else { chainState[s.chain]=true; updateProgress(); }
      }
    }));
    transitioning = false;
  }, 350);
}

function flash(cb) {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => { cb(); f.classList.remove('on'); }, 200);
}

// Auto-loop with strobo headlines + clock
let autoAbort = false;
function runAutoLoop() {
  autoAbort = false;
  const card = document.getElementById('card');
  resetChain();

  card.innerHTML = `
    <div class="card-loop-badge" id="autoBadge">Runde 3</div>
    <div class="auto-area">
      <div class="auto-label" id="autoLabel">&nbsp;</div>
      <div id="autoIcon" class="auto-icon"></div>
      <div class="auto-clock">
        <div class="clock-face">
          <div class="clock-hand" id="clockHand" style="transform:rotate(0deg)"></div>
          <div class="clock-center"></div>
        </div>
      </div>
      <div class="auto-plant" id="autoPlant">
        <svg viewBox="0 0 60 80" width="52" height="68">
          <rect x="20" y="58" width="20" height="18" rx="2" fill="#6B5837" opacity=".5"/>
          <g class="plant-group" id="plantGroup">
            <line x1="30" y1="58" x2="30" y2="20" class="plant-stem" id="plantStem" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
            <ellipse cx="22" cy="30" rx="8" ry="4" class="plant-leaf" id="pL1" fill="#22c55e" transform="rotate(-25 22 30)" opacity=".85"/>
            <ellipse cx="38" cy="24" rx="7" ry="3.5" class="plant-leaf" id="pL2" fill="#22c55e" transform="rotate(20 38 24)" opacity=".75"/>
            <ellipse cx="24" cy="42" rx="6" ry="3" class="plant-leaf" id="pL3" fill="#22c55e" transform="rotate(-15 24 42)" opacity=".65"/>
            <ellipse cx="36" cy="36" rx="5.5" ry="2.8" class="plant-leaf" id="pL4" fill="#22c55e" transform="rotate(15 36 36)" opacity=".55"/>
          </g>
        </svg>
      </div>
    </div>
    <p style="margin-top:.5rem;color:var(--text3);font-size:.85rem" id="autoText">Autopilot...</p>`;
  card.classList.add('active');

  const speeds = [
    [500, 420, 360, 300, 260],
    [320, 270, 220, 180, 150],
    [200, 170, 140, 110, 90],
    [130, 110, 90, 70, 55],
    [80, 65, 50, 40, 30]
  ];
  const roundLabels = ['Runde 3','Runde 4','Runde 5','Runde 6','Runde 7'];
  let clockAngle = 0;
  let round = 0;

  const plantColors = ['#22c55e','#84cc16','#eab308','#f97316','#ef4444'];
  const plantDroops = [0, 10, 22, 36, 52];

  function updatePlant(r) {
    const g = document.getElementById('plantGroup');
    if (!g) return;
    const color = plantColors[Math.min(r, 4)];
    const droop = plantDroops[Math.min(r, 4)];
    g.style.transform = `rotate(${droop}deg)`;
    const stem = document.getElementById('plantStem');
    if (stem) stem.setAttribute('stroke', color);
    ['pL1','pL2','pL3','pL4'].forEach((id, i) => {
      const l = document.getElementById(id);
      if (l) {
        l.setAttribute('fill', color);
        l.style.opacity = String(Math.max(0.2, 0.85 - r * 0.15 - i * 0.05));
      }
    });
  }

  function runRound() {
    if (autoAbort) return;
    if (round >= speeds.length) {
      autoAbort = true;
      setTimeout(() => {
        transitioning = false;
        setTimeout(() => { next(); }, 50);
      }, 400);
      return;
    }
    resetChain();
    updatePlant(round);
    const badge = document.getElementById('autoBadge');
    const autoText = document.getElementById('autoText');
    if (badge) badge.textContent = roundLabels[round];
    if (autoText && round >= 3) autoText.textContent = 'Immer schneller...';

    let i = 0;
    const sp = speeds[round];

    function tick() {
      if (autoAbort) return;
      if (i >= chainKeys.length) {
        round++;
        setTimeout(runRound, round < speeds.length ? 180 : 250);
        return;
      }
      const el = document.getElementById('autoIcon');
      const label = document.getElementById('autoLabel');
      const hand = document.getElementById('clockHand');
      if (!el || !label || !hand) { autoAbort = true; return; }

      // Icon
      el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" style="width:100%;height:100%;color:var(--accent)">${miniIcons[chainKeys[i]].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`;
      el.className = 'auto-icon pop';
      // Label flash
      label.textContent = chainLabels[i];
      label.classList.add('show');
      // Chain
      chainState[i] = true;
      updateProgress();
      // Clock
      clockAngle += (360 / chainKeys.length) * (1 + round * 0.5);
      hand.style.transition = `transform ${sp[i]*0.5}ms linear`;
      hand.style.transform = `rotate(${clockAngle}deg)`;

      const hideDelay = Math.max(sp[i] * 0.5, 30);
      setTimeout(() => {
        if (autoAbort) return;
        const el2 = document.getElementById('autoIcon');
        const label2 = document.getElementById('autoLabel');
        if (el2) el2.className = 'auto-icon shrink';
        if (label2) label2.classList.remove('show');
      }, hideDelay);
      i++;
      setTimeout(tick, sp[i-1]);
    }
    setTimeout(tick, round === 0 ? 350 : 100);
  }
  setTimeout(runRound, 400);
}

function showStopp() {
  autoAbort = true;
  const card = document.getElementById('card');
  card.classList.remove('active');

  function step1() {
    const f = document.getElementById('flash');
    if (!f) { transitioning = false; return; }
    f.classList.add('on');
    setTimeout(step2, 800);
  }
  function step2() {
    const f = document.getElementById('flash');
    card.innerHTML = '';
    card.classList.remove('exit-up');
    card.classList.add('active');
    if (f) f.classList.remove('on');
    resetChain();
    setTimeout(step3, 600);
  }
  function step3() {
    card.innerHTML = `<h2 class="big" style="opacity:0;transition:opacity .6s">STOP</h2>`;
    // Force reflow before setting opacity to ensure transition fires
    void card.offsetHeight;
    requestAnimationFrame(() => {
      const h2 = card.querySelector('h2');
      if (h2) h2.style.opacity = '1';
      setTimeout(() => { transitioning = false; next(); }, 1800);
    });
  }

  setTimeout(step1, 350);
}

function next() {
  if (transitioning) return;
  transitioning = true;
  currentIdx++;
  if (currentIdx >= steps.length) { transitioning = false; return; }
  const s = steps[currentIdx];
  if (s.auto) {
    flash(() => {
      renderCard(currentIdx);
      const card = document.getElementById('card');
      card.classList.remove('exit-up');
      card.classList.add('active');
      transitioning = false;
      setTimeout(runAutoLoop, 300);
    });
  }
  else if (s.isStop) { showStopp(); }
  else if (s.resetChain && currentIdx > 1) { flash(() => showCard(currentIdx)); }
  else { showCard(currentIdx); }
}

// Init
updateProgress();
renderCard(0);
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.getElementById('card').classList.add('active');
}));
</script>
</body>
</html>
